[pytest]
# Pytest Configuration for Supporting Data API Tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = .

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Coverage options
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    # Warnings
    -W ignore::DeprecationWarning
    # Parallel execution (optional, uncomment to enable)
    # -n auto

# Markers
markers =
    integration: Integration tests that call real APIs
    security: Security and authorization tests
    contract: Contract validation and snapshot tests
    slow: Tests that take longer to execute

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (in seconds)
timeout = 30

# Minimum Python version
minversion = 3.8

; Made with Bob
