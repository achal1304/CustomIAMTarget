# Render Blueprint for SCIM 2.0 Service Provider
# This file enables Infrastructure as Code deployment on Render

services:
  - type: web
    name: scim-service-provider
    env: python
    region: singapore  # Change to: oregon, frankfurt, singapore, etc.
    plan: free  # Options: free, starter, standard, pro
    branch: main  # Your git branch
    buildCommand: pip install -r requirements.txt && pip install gunicorn
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 60 --access-logfile - --error-logfile - app:app
    healthCheckPath: /
    autoDeploy: true
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      
      - key: HOST
        value: 0.0.0.0
      
      - key: PORT
        sync: false  # Render sets this automatically
      
      - key: DEBUG
        value: False
      
      - key: BASE_URL
        sync: false  # Set this to your Render URL
      
      # Authentication Configuration
      - key: AUTH_OAUTH_ENABLED
        value: true
      
      - key: AUTH_JWT_ENABLED
        value: true
      
      - key: AUTH_BASIC_ENABLED
        value: true
      
      - key: AUTH_MTLS_ENABLED
        value: false
      
      - key: AUTH_ENFORCE_AUTHZ
        value: true
      
      # JWT Configuration
      - key: AUTH_JWT_ISSUER
        value: https://test-idp.example.com
      
      - key: AUTH_JWT_AUDIENCE
        value: scim-service-provider
      
      - key: AUTH_JWT_ALGORITHM
        value: RS256
      
      # Secrets - Set these in Render Dashboard
      - key: AUTH_JWT_PUBLIC_KEY
        sync: false  # Set as secret in Render Dashboard
      
      - key: AUTH_BASIC_USERS
        sync: false  # Set as secret in Render Dashboard

